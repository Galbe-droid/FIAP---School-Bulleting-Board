name: Node.js CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:

      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Test DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL está vazia"
            exit 1
          else
            echo "DATABASE_URL encontrada"
          fi

      - name: Aplicar banco SQLite
        run: npx prisma db push

      - name: Build Docker Image
        run: docker build --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" -t bulletingboard-api .
  
      - name: Executar testes
        run: npm test